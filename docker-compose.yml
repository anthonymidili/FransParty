services:
  worker:
    build: .
    command: bin/rails solid_queue:start
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    env_file:
      - .env
    depends_on:
      web:
        condition: service_started

  web:
    build: .
    command: bin/rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      js:
        condition: service_started
      css:
        condition: service_started

  js:
    build: .
    command: yarn build --watch
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - node_modules:/rails/node_modules
    env_file:
      - .env

  css:
    build: .
    command: yarn watch:css
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
      - node_modules:/rails/node_modules
    env_file:
      - .env

volumes:
  bundle_cache:
  node_modules:
