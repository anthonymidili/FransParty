# Docker Compose configuration for development environment
# To run: docker compose -f docker-compose.dev.yml up
# To stop: docker compose -f docker-compose.dev.yml down
# To rebuild: docker compose -f docker-compose.dev.yml up --build
services:
  web:
    build: .
    command: bundle exec passenger start
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      LD_PRELOAD: ""
    volumes:
      - .:/rails
      - /rails/node_modules
      - /rails/tmp
    ports:
      - "${PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

  worker:
    build: .
    command: bin/rails solid_queue:start
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      LD_PRELOAD: ""
    volumes:
      - .:/rails
      - /rails/node_modules
      - /rails/tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web

  js:
    build: .
    command: yarn build --watch
    environment:
      RAILS_ENV: development
      LD_PRELOAD: ""
    volumes:
      - .:/rails
      - /rails/node_modules
      - /rails/tmp
    stdin_open: true
    tty: true

  css:
    build: .
    command: yarn watch:css
    environment:
      RAILS_ENV: development
      LD_PRELOAD: ""
    volumes:
      - .:/rails
      - /rails/node_modules
      - /rails/tmp
    stdin_open: true
    tty: true
